# Railway runtime
server.port=${PORT:8081}
server.address=0.0.0.0
server.servlet.session.timeout=1h
server.servlet.session.cookie.same-site=none
server.servlet.session.cookie.secure=true
server.tomcat.threads.max=${TOMCAT_THREADS_MAX:20}
server.tomcat.threads.min-spare=${TOMCAT_THREADS_MIN:2}
server.tomcat.accept-count=${TOMCAT_ACCEPT_COUNT:80}
server.tomcat.max-connections=${TOMCAT_MAX_CONNECTIONS:150}

# Railway MySQL service
spring.datasource.url=jdbc:mysql://${MYSQLHOST}:${MYSQLPORT}/${MYSQLDATABASE}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=${MYSQLUSER}
spring.datasource.password=${MYSQLPASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.hikari.maximum-pool-size=${DB_POOL_MAX_SIZE:3}
spring.datasource.hikari.minimum-idle=${DB_POOL_MIN_IDLE:0}
spring.datasource.hikari.idle-timeout=${DB_POOL_IDLE_TIMEOUT:30000}
spring.datasource.hikari.max-lifetime=${DB_POOL_MAX_LIFETIME:600000}
spring.datasource.hikari.connection-timeout=${DB_CONNECTION_TIMEOUT:5000}
spring.datasource.hikari.validation-timeout=${DB_VALIDATION_TIMEOUT:5000}
spring.datasource.hikari.initialization-fail-timeout=${DB_INITIALIZATION_FAIL_TIMEOUT:-1}

# Persistence
spring.jpa.hibernate.ddl-auto=${DB_DDL_AUTO:none}
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.boot.allow_jdbc_metadata_access=${HIBERNATE_ALLOW_JDBC_METADATA_ACCESS:false}
spring.jpa.show-sql=false
app.database.schema-fixer.enabled=${DATABASE_SCHEMA_FIXER_ENABLED:false}
logging.level.org.hibernate.SQL=ERROR
logging.level.org.springframework=INFO
logging.level.com.virtuehire=INFO

# Attach a Railway volume at /app/uploads
file.upload-dir=${UPLOAD_DIR:/app/uploads}
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Application
assessment.pass.percent=${ASSESSMENT_PASS_PERCENT:75}
spring.jackson.property-naming-strategy=LOWER_CAMEL_CASE
spring.thymeleaf.cache=true
spring.jmx.enabled=false
spring.main.lazy-initialization=${SPRING_LAZY_INITIALIZATION:true}
spring.main.banner-mode=console
app.websocket.scheduler.pool-size=${WEBSOCKET_SCHEDULER_POOL_SIZE:1}
app.websocket.channel.pool-size=${WEBSOCKET_CHANNEL_POOL_SIZE:1}

# SMTP provider. For Brevo, set MAIL_HOST=smtp-relay.brevo.com and MAIL_PORT=587.
# If using Brevo REST API instead of SMTP, set BREVO_API_KEY to a valid Brevo API key.
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.ssl.trust=${MAIL_SMTP_TRUST:${MAIL_HOST:smtp.gmail.com}}
spring.mail.properties.mail.smtp.ssl.protocols=TLSv1.2
spring.mail.properties.mail.smtp.connectiontimeout=${MAIL_CONNECTION_TIMEOUT:10000}
spring.mail.properties.mail.smtp.timeout=${MAIL_TIMEOUT:10000}
spring.mail.properties.mail.smtp.writetimeout=${MAIL_WRITE_TIMEOUT:10000}
app.mail.from=${MAIL_FROM:${MAIL_USERNAME:}}

# Comma-separated frontend origins. Railway's generated domain and production admin domain are allowed by default.
app.cors.allowed-origin-patterns=${CORS_ALLOWED_ORIGIN_PATTERNS:https://admin.virtuehire.in,https://*.up.railway.app,http://localhost:*}

# Use a hosted Judge0 endpoint in production if code execution is required.
judge0.base-url=${JUDGE0_BASE_URL:http://localhost:2358}
judge0.api-key=${JUDGE0_API_KEY:}
