name: Build, Test & Verify

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]

jobs:
  build-backend:
    name: Build Java Backend
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: maven
        
    - name: Compile Backend
      working-directory: ./Backend
      run: mvn clean compile -B
      
    - name: Run Backend Tests
      working-directory: ./Backend
      run: mvn test -B
      
    - name: Package JAR
      working-directory: ./Backend
      run: mvn package -DskipTests -B
      
    - name: Upload Backend Artifact
      uses: actions/upload-artifact@v4
      with:
        name: backend-jar
        path: Backend/target/*.jar

  build-frontend:
    name: Build React Frontend
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: Frontend/package-lock.json
        
    - name: Install Dependencies
      working-directory: ./Frontend
      run: npm ci
      
    - name: Build Frontend
      working-directory: ./Frontend
      run: npm run build
      
    - name: Upload Frontend Artifact
      uses: actions/upload-artifact@v4
      with:
        name: frontend-build
        path: Frontend/build

  verify-judge0-integration:
    name: Verify Judge0 Integration
    runs-on: ubuntu-latest
    needs: build-backend
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Check Judge0 Configuration
      run: |
        echo "Checking Judge0 configuration..."
        if grep -q "judge0.base-url" Backend/src/main/resources/application.properties; then
          echo "✓ Judge0 base URL configured"
        else
          echo "✗ Judge0 base URL NOT configured"
          exit 1
        fi
        
        if grep -q "CodeExecutionService" Backend/src/main/java/com/virtuehire/service/*.java; then
          echo "✓ CodeExecutionService found"
        else
          echo "✗ CodeExecutionService NOT found"
          exit 1
        fi
        
        echo "Judge0 integration verified!"
      
    - name: Comment on PR
      if: github.event_name == 'pull_request'
      uses: actions/github-script@v7
      with:
        script: |
          github.rest.issues.createComment({
            issue_number: context.issue.number,
            owner: context.repo.owner,
            repo: context.repo.repo,
            body: '✅ Build completed successfully!\n\n**Artifacts:**\n- Backend JAR\n- Frontend Build\n\n**Judge0 Integration:** Verified\n\n**Next Steps for Deployment:**\n1. Start infrastructure: `docker-compose up -d`\n2. Deploy backend JAR\n3. Deploy frontend build\n\n*Note: Judge0 requires Docker to be running for code execution features*'
          })
